name: Deploy — Frontend (S3/CloudFront) + Backend (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - frontend-only
          - backend-only

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build React app and deploy to S3 + CloudFront
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'frontend-only' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # Injected at build time so the JS bundle has the correct API URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://snappad \
            --delete \
            --cache-control "no-cache" \
            --exclude "assets/*"
          # Long-cache for hashed assets
          aws s3 sync dist/assets/ s3://snappad/assets/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E21PAW4VW19RL4 \
            --paths "/*"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SSH into EC2 and pull + rebuild backend
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🖥️ Backend → EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'backend-only' }}

    steps:
      - name: Deploy backend to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/snappad

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing backend dependencies..."
            npm ci --workspace backend

            echo "🔨 Building TypeScript..."
            npm run build --workspace backend

            echo "♻️  Restarting PM2 process..."
            pm2 restart snappad-backend --update-env

            echo "✅ Backend deployed successfully"
            pm2 status